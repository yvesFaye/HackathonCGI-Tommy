<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice ID - Mobile Agent Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blue: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    },
                    animation: {
                        'waveform': 'waveform 1s ease-in-out infinite',
                        'pop-in': 'pop-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-down': 'slide-down 0.4s ease-out forwards',
                        'flash-bg': 'flash-bg 2s ease-out forwards',
                        'scale-check': 'scale-check 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards'
                    },
                    keyframes: {
                        waveform: {
                            '0%, 100%': { height: '8px' },
                            '50%': { height: '28px' },
                        },
                        'pop-in': {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        'slide-down': {
                            '0%': { transform: 'translateY(-10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        'flash-bg': {
                            '0%': { backgroundColor: '#eff6ff', borderColor: '#3b82f6' },
                            '20%': { backgroundColor: '#dbeafe', borderColor: '#3b82f6' },
                            '100%': { backgroundColor: '#ffffff', borderColor: '#e2e8f0' },
                        },
                        'scale-check': {
                            '0%': { transform: 'scale(0) rotate(-45deg)', opacity: '0' },
                            '100%': { transform: 'scale(1) rotate(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .wave-1 { animation-delay: 0.0s; }
        .wave-2 { animation-delay: 0.1s; }
        .wave-3 { animation-delay: 0.2s; }
        .wave-4 { animation-delay: 0.3s; }
        .wave-5 { animation-delay: 0.4s; }
        .wave-6 { animation-delay: 0.5s; }
        .wave-7 { animation-delay: 0.2s; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-500 { animation-delay: 0.5s; }
    </style>
</head>
<body class="bg-slate-200 min-h-screen flex items-center justify-center py-8 font-sans">

    <div class="max-w-sm w-full bg-slate-50 shadow-2xl rounded-[2.5rem] overflow-hidden flex flex-col relative border-[8px] border-slate-800 h-[800px]">
        
        <div class="bg-gradient-to-br from-blue-600 to-blue-800 text-white p-6 pb-12 rounded-b-[2rem] shadow-md relative z-10">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-phone-alt text-sm"></i>
                    <span class="text-sm font-medium opacity-90">Appel en cours...</span>
                </div>
                <span class="font-mono text-lg font-semibold tracking-wider">01:14</span>
            </div>

            <div class="flex flex-col items-center justify-center space-y-3">
                <span class="text-xs uppercase tracking-widest text-blue-200 font-semibold">Analyse Vocale</span>
                <div class="flex items-end space-x-1.5 h-8">
                    <div class="w-1.5 bg-blue-300 rounded-full animate-waveform wave-1"></div>
                    <div class="w-1.5 bg-blue-200 rounded-full animate-waveform wave-2"></div>
                    <div class="w-1.5 bg-white rounded-full animate-waveform wave-3"></div>
                    <div class="w-1.5 bg-white rounded-full animate-waveform wave-4"></div>
                    <div class="w-1.5 bg-white rounded-full animate-waveform wave-5"></div>
                    <div class="w-1.5 bg-blue-200 rounded-full animate-waveform wave-6"></div>
                    <div class="w-1.5 bg-blue-300 rounded-full animate-waveform wave-7"></div>
                </div>
            </div>
        </div>

        <div class="relative -mt-10 flex justify-center z-20 px-6">
            <div class="flex items-end space-x-4 w-full">
                <div class="relative">
                    <div class="w-20 h-20 bg-slate-100 rounded-2xl shadow-lg border-4 border-white flex items-center justify-center overflow-hidden">
                        <span class="text-5xl transform translate-y-1">🐱</span>
                    </div>
                    <div class="absolute -bottom-1 -right-1 bg-white rounded-full p-1 shadow-sm">
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter px-1">Calme</span>
                    </div>
                </div>

                <div class="flex-1 bg-white rounded-xl shadow-lg border border-slate-100 p-3 flex items-center animate-slide-down">
                    <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center mr-3 relative">
                        <div class="absolute inset-0 rounded-full bg-green-400 animate-ping opacity-20"></div>
                        <i class="fas fa-check text-green-500 text-xl animate-scale-check"></i>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase text-slate-400 font-bold">Empreinte Vocale</p>
                        <p class="text-sm font-bold text-slate-800">Identité Confirmée</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 px-5 pt-6 flex flex-col gap-4 overflow-y-auto pb-8">
            
            <div class="bg-green-500 text-white p-3 rounded-xl shadow-sm flex items-center gap-3 animate-pop-in">
                <i class="fas fa-folder-open text-lg ml-1"></i>
                <span class="font-semibold text-sm">Dossier ouvert automatiquement</span>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex-1 relative">
                
                <div class="flex items-center justify-between mb-5">
                    <h3 class="font-bold text-slate-800 text-sm flex items-center">
                        <i class="fas fa-bolt text-blue-500 mr-2"></i> Extraction en direct
                    </h3>
                    <span class="flex h-2.5 w-2.5 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-blue-600"></span>
                    </span>
                </div>

                <div class="space-y-4">
                    <div class="relative rounded-xl p-3 border animate-flash-bg delay-100 opacity-0" style="animation-fill-mode: forwards;">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500 rounded-l-xl"></div>
                        <label class="text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1 flex items-center justify-between">
                            Nom du client
                            <i class="fas fa-magic text-blue-400 text-[10px]"></i>
                        </label>
                        <div class="font-bold text-slate-800 text-base">Kevin Tremblay</div>
                    </div>

                    <div class="relative rounded-xl p-3 border animate-flash-bg delay-300 opacity-0" style="animation-fill-mode: forwards;">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500 rounded-l-xl"></div>
                        <label class="text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1 flex items-center justify-between">
                            Numéro de Police
                            <i class="fas fa-magic text-blue-400 text-[10px]"></i>
                        </label>
                        <div class="font-bold text-slate-800 text-base font-mono">AUTO-2024-88321</div>
                    </div>

                    <div class="relative rounded-xl p-3 border animate-flash-bg delay-500 opacity-0" style="animation-fill-mode: forwards;">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500 rounded-l-xl"></div>
                        <label class="text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1 flex items-center justify-between">
                            Numéro de Sinistre
                            <i class="fas fa-magic text-blue-400 text-[10px]"></i>
                        </label>
                        <div class="font-bold text-slate-800 text-base font-mono">REC-2024-441</div>
                    </div>
                </div>
            </div>
            
            <div class="mt-auto grid grid-cols-2 gap-3 pt-2">
                <button class="bg-blue-50 text-blue-700 py-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 border border-blue-100">
                    <i class="fas fa-file-alt"></i> Voir le contrat
                </button>
                <button class="bg-blue-600 text-white py-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 shadow-md shadow-blue-500/30">
                    <i class="fas fa-arrow-right"></i> Traiter
                </button>
            </div>
        </div>
    </div>
</body>
</html>
